openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Marketplace API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Browser and mobile authentication endpoints
  - name: profiles
    description: User profile operations
  - name: listings
    description: Listing CRUD operations
  - name: messages
    description: Real-time messaging
  - name: stats
    description: Aggregated statistics
  - name: ratings
    description: Profile ratings
  - name: admin
    description: Admin operations
  - name: stripe
    description: Payment integration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Auth status resolved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"

  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to OIDC authorization endpoint

  /callback:
    get:
      tags: [auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        "302":
          description: Redirect after login

  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear session and begin OIDC logout
      responses:
        "302":
          description: Redirect to OIDC logout

  /mobile-auth/token-exchange:
    post:
      tags: [auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Invalid params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mobile-auth/logout:
    post:
      tags: [auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      responses:
        "200":
          description: Logout processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  /stripe/checkout:
    post:
      tags: [stripe]
      operationId: createStripeCheckout
      summary: Create a Stripe checkout session for a premium listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCheckoutResponse"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stripe/checkout-category:
    post:
      tags: [stripe]
      operationId: createCategoryCheckout
      summary: Create a Stripe checkout session for a paid-category listing fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCheckoutResponse"
        "404":
          description: Listing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stripe/listing-price:
    get:
      tags: [stripe]
      operationId: getListingPrice
      summary: Get the current premium listing price info
      responses:
        "200":
          description: Price info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingPriceResponse"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/listings:
    get:
      operationId: getProfileListings
      tags: [profiles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listings by seller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /profiles/{id}/ratings:
    get:
      operationId: getProfileRatings
      tags: [ratings]
      summary: Get ratings for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile ratings summary and list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileRatings"
    post:
      operationId: submitRating
      tags: [ratings]
      summary: Submit a rating for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRatingBody"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingWithSeller"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}/report:
    post:
      operationId: reportListing
      tags: [listings]
      summary: Report a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportListingBody"
      responses:
        "200":
          description: Listing reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}/messages:
    get:
      operationId: getMessages
      tags: [messages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /stats/categories:
    get:
      operationId: getCategoryStats
      tags: [stats]
      responses:
        "200":
          description: Category stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

  /stats/recent:
    get:
      operationId: getRecentListings
      tags: [stats]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /admin/listings:
    get:
      operationId: adminGetListings
      tags: [admin]
      summary: Get all listings for admin management
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: isReported
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Admin listing list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminListing"

  /admin/listings/{id}/status:
    patch:
      operationId: adminUpdateListingStatus
      tags: [admin]
      summary: Approve, reject, or delete a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminListing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform statistics
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Profile:
      type: object
      properties:
        id:
          type: string
        username:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, createdAt]

    Listing:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        status:
          type: string
        listingType:
          type: string
        isReported:
          type: boolean
        reportReason:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        expiryDate:
          type: ["string", "null"]
        paidAt:
          type: ["string", "null"]
        paymentStatus:
          type: string
        listingFee:
          type: number
        daysAge:
          type: integer
        createdAt:
          type: string
      required: [id, sellerId, title, price, isNegotiable, category, location, imageUrls, status, listingType, isReported, paymentStatus, listingFee, daysAge, createdAt]

    ListingWithSeller:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        status:
          type: string
        listingType:
          type: string
        isReported:
          type: boolean
        reportReason:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        expiryDate:
          type: ["string", "null"]
        paidAt:
          type: ["string", "null"]
        paymentStatus:
          type: string
        listingFee:
          type: number
        daysAge:
          type: integer
        createdAt:
          type: string
        seller:
          $ref: "#/components/schemas/Profile"
      required: [id, sellerId, title, price, isNegotiable, category, location, imageUrls, status, listingType, isReported, paymentStatus, listingFee, daysAge, createdAt, seller]

    AdminListing:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
        sellerName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        status:
          type: string
        listingType:
          type: string
        isReported:
          type: boolean
        reportReason:
          type: ["string", "null"]
        expiryDate:
          type: ["string", "null"]
        paidAt:
          type: ["string", "null"]
        daysAge:
          type: integer
        createdAt:
          type: string
      required: [id, sellerId, title, price, isNegotiable, category, location, imageUrls, status, listingType, isReported, daysAge, createdAt]

    CreateListingBody:
      type: object
      properties:
        sellerId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        listingType:
          type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
      required: [sellerId, title, price, category, location]

    UpdateListingBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]

    ReportListingBody:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    AdminUpdateStatusBody:
      type: object
      properties:
        status:
          type: string
        reason:
          type: ["string", "null"]
      required: [status]

    Message:
      type: object
      properties:
        id:
          type: string
        listingId:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
      required: [id, listingId, senderId, receiverId, content, createdAt]

    SendMessageBody:
      type: object
      properties:
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
      required: [senderId, receiverId, content]

    Conversation:
      type: object
      properties:
        listingId:
          type: string
        listingTitle:
          type: string
        listingImage:
          type: ["string", "null"]
        otherUserId:
          type: string
        otherUserName:
          type: ["string", "null"]
        lastMessage:
          type: string
        lastMessageAt:
          type: string
        unreadCount:
          type: integer
      required: [listingId, listingTitle, otherUserId, lastMessage, lastMessageAt, unreadCount]

    CategoryStat:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required: [category, count]

    RatingItem:
      type: object
      properties:
        id:
          type: string
        raterId:
          type: string
        ratedId:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        raterName:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, raterId, ratedId, rating, createdAt]

    ProfileRatings:
      type: object
      properties:
        averageRating:
          type: ["number", "null"]
        totalRatings:
          type: integer
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/RatingItem"
      required: [totalRatings, ratings]

    SubmitRatingBody:
      type: object
      properties:
        raterId:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
      required: [raterId, rating]

    AdminStats:
      type: object
      properties:
        totalListings:
          type: integer
        activeListings:
          type: integer
        deletedListings:
          type: integer
        reportedListings:
          type: integer
        pendingListings:
          type: integer
        freeListings:
          type: integer
        paidListings:
          type: integer
        totalProfiles:
          type: integer
        newProfilesThisPeriod:
          type: integer
        newListingsThisPeriod:
          type: integer
      required: [totalListings, activeListings, deletedListings, reportedListings, pendingListings, freeListings, paidListings, totalProfiles, newProfilesThisPeriod, newListingsThisPeriod]

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    CreateCheckoutBody:
      type: object
      required: [listingId]
      properties:
        listingId:
          type: string

    CreateCheckoutResponse:
      type: object
      required: [url]
      properties:
        url:
          type: ["string", "null"]

    ListingPriceResponse:
      type: object
      required: [amount, currency]
      properties:
        priceId:
          type: ["string", "null"]
        amount:
          type: integer
        currency:
          type: string
