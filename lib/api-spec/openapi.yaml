openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Marketplace API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profiles
    description: User profile operations
  - name: listings
    description: Listing CRUD operations
  - name: messages
    description: Real-time messaging
  - name: stats
    description: Aggregated statistics
  - name: ratings
    description: Profile ratings
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profiles/{id}/listings:
    get:
      operationId: getProfileListings
      tags: [profiles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listings by seller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /profiles/{id}/ratings:
    get:
      operationId: getProfileRatings
      tags: [ratings]
      summary: Get ratings for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile ratings summary and list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileRatings"
    post:
      operationId: submitRating
      tags: [ratings]
      summary: Submit a rating for a profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitRatingBody"
      responses:
        "201":
          description: Rating submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingWithSeller"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}/report:
    post:
      operationId: reportListing
      tags: [listings]
      summary: Report a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportListingBody"
      responses:
        "200":
          description: Listing reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{id}/messages:
    get:
      operationId: getMessages
      tags: [messages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/conversations:
    get:
      operationId: getConversations
      tags: [messages]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /stats/categories:
    get:
      operationId: getCategoryStats
      tags: [stats]
      responses:
        "200":
          description: Category stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryStat"

  /stats/recent:
    get:
      operationId: getRecentListings
      tags: [stats]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /admin/listings:
    get:
      operationId: adminGetListings
      tags: [admin]
      summary: Get all listings for admin management
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: isReported
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Admin listing list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminListing"

  /admin/listings/{id}/status:
    patch:
      operationId: adminUpdateListingStatus
      tags: [admin]
      summary: Approve, reject, or delete a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateStatusBody"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminListing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform statistics
      parameters:
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Profile:
      type: object
      properties:
        id:
          type: string
        username:
          type: ["string", "null"]
        fullName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, createdAt]

    Listing:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        status:
          type: string
        listingType:
          type: string
        isReported:
          type: boolean
        reportReason:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        createdAt:
          type: string
      required: [id, sellerId, title, price, isNegotiable, category, location, imageUrls, status, listingType, isReported, createdAt]

    ListingWithSeller:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        status:
          type: string
        listingType:
          type: string
        isReported:
          type: boolean
        reportReason:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        createdAt:
          type: string
        seller:
          $ref: "#/components/schemas/Profile"
      required: [id, sellerId, title, price, isNegotiable, category, location, imageUrls, status, listingType, isReported, createdAt, seller]

    AdminListing:
      type: object
      properties:
        id:
          type: string
        sellerId:
          type: string
        sellerName:
          type: ["string", "null"]
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        status:
          type: string
        listingType:
          type: string
        isReported:
          type: boolean
        reportReason:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, sellerId, title, price, isNegotiable, category, location, imageUrls, status, listingType, isReported, createdAt]

    CreateListingBody:
      type: object
      properties:
        sellerId:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        listingType:
          type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
      required: [sellerId, title, price, category, location]

    UpdateListingBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        isNegotiable:
          type: boolean
        category:
          type: string
        location:
          type: string
        imageUrls:
          type: array
          items:
            type: string
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]

    ReportListingBody:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    AdminUpdateStatusBody:
      type: object
      properties:
        status:
          type: string
        reason:
          type: ["string", "null"]
      required: [status]

    Message:
      type: object
      properties:
        id:
          type: string
        listingId:
          type: string
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
        createdAt:
          type: string
        senderName:
          type: ["string", "null"]
      required: [id, listingId, senderId, receiverId, content, createdAt]

    SendMessageBody:
      type: object
      properties:
        senderId:
          type: string
        receiverId:
          type: string
        content:
          type: string
      required: [senderId, receiverId, content]

    Conversation:
      type: object
      properties:
        listingId:
          type: string
        listingTitle:
          type: string
        listingImage:
          type: ["string", "null"]
        otherUserId:
          type: string
        otherUserName:
          type: ["string", "null"]
        lastMessage:
          type: string
        lastMessageAt:
          type: string
        unreadCount:
          type: integer
      required: [listingId, listingTitle, otherUserId, lastMessage, lastMessageAt, unreadCount]

    CategoryStat:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required: [category, count]

    RatingItem:
      type: object
      properties:
        id:
          type: string
        raterId:
          type: string
        ratedId:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        raterName:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, raterId, ratedId, rating, createdAt]

    ProfileRatings:
      type: object
      properties:
        averageRating:
          type: ["number", "null"]
        totalRatings:
          type: integer
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/RatingItem"
      required: [totalRatings, ratings]

    SubmitRatingBody:
      type: object
      properties:
        raterId:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
      required: [raterId, rating]

    AdminStats:
      type: object
      properties:
        totalListings:
          type: integer
        activeListings:
          type: integer
        deletedListings:
          type: integer
        reportedListings:
          type: integer
        pendingListings:
          type: integer
        freeListings:
          type: integer
        paidListings:
          type: integer
        totalProfiles:
          type: integer
        newProfilesThisPeriod:
          type: integer
        newListingsThisPeriod:
          type: integer
      required: [totalListings, activeListings, deletedListings, reportedListings, pendingListings, freeListings, paidListings, totalProfiles, newProfilesThisPeriod, newListingsThisPeriod]
