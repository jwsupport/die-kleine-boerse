##############################################################################
# die kleine Börse — Nginx-Konfiguration für Hetzner CPX22
# Ersetze DEINE_DOMAIN.de überall mit der echten Domain
##############################################################################

# Verbindungen pro Worker optimieren (CPX22: 3 vCPUs)
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    types_hash_max_size 2048;
    client_max_body_size 25m;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip-Komprimierung ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/x-component
        text/x-cross-domain-policy;

    # ── Connection Keep-Alive ────────────────────────────────────────────────
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Rate Limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # ── Upstream: Node.js API ────────────────────────────────────────────────
    upstream api_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name DEINE_DOMAIN.de www.DEINE_DOMAIN.de;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Hauptserver ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name DEINE_DOMAIN.de www.DEINE_DOMAIN.de;

        # SSL (via Certbot befüllt)
        ssl_certificate     /etc/letsencrypt/live/DEINE_DOMAIN.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DEINE_DOMAIN.de/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Verbindungen pro IP begrenzen
        limit_conn conn 50;

        # ── API: /api/* → Node.js ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Gzip für proxied responses
            proxy_set_header Accept-Encoding "";
            gzip on;
        }

        # Auth-Endpunkte stärker drosseln
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Statische Assets: lange Caching-Zeit (Vite fingerprinting) ────────
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
            root /var/www/diekleineboerse/artifacts/marketplace/dist/public;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
            try_files $uri =404;
        }

        # ── Frontend SPA (React) ──────────────────────────────────────────────
        location / {
            root  /var/www/diekleineboerse/artifacts/marketplace/dist/public;
            index index.html;

            # Keine Cache für index.html (damit neue Deployments sofort wirken)
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires 0;

            # SPA-Routing: unbekannte Pfade → index.html
            try_files $uri $uri/ /index.html;
        }
    }
}
